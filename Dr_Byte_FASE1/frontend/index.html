<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Byte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-cpu me-2"></i>Doctor Byte
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="index.html">
              <i class="bi bi-search me-1"></i>Diagnóstico
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="historial.html">
              <i class="bi bi-clock-history me-1"></i>Historial
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="admin.html">
              <i class="bi bi-gear me-1"></i>Administración
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-section text-center py-5">
    <div class="container">
      <i class="bi bi-heart-pulse display-3 text-primary mb-3 d-block"></i>
      <h1 class="fw-bold">¿Qué le pasa a tu computadora?</h1>
      <p class="text-muted fs-5">Selecciona los síntomas que presenta tu equipo y obtén un diagnóstico automático.</p>
    </div>
  </section>

  <!-- Síntomas -->
  <div class="banda-oscura" style="background-color: var(--color-oscuro); padding: 32px 0;">
    <section class="container mb-0">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0"><i class="bi bi-list-check me-2 text-primary"></i>Síntomas</h5>
        </div>
        <div class="card-body">
          <div id="sintomas-container" class="row g-3">
            <div class="col-12 text-center text-muted py-4">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2">Cargando síntomas...</p>
            </div>
          </div>
        </div>
        <div class="card-footer bg-white text-end">
          <button id="btn-limpiar" class="btn btn-outline-secondary me-2">
            <i class="bi bi-x-circle me-1"></i>Limpiar
          </button>
          <button id="btn-diagnosticar" class="btn btn-primary">
            <i class="bi bi-search me-1"></i>Diagnosticar
          </button>
        </div>
      </div>
    </section>
  </div>

  <!-- Resultado -->
  <section class="container mb-5" id="seccion-resultado" style="display:none;">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-clipboard2-pulse me-2 text-primary"></i>Resultado del diagnóstico</h5>
      </div>
      <div class="card-body" id="resultado-contenido"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/diagnostico.js"></script>
</body>
</html>
