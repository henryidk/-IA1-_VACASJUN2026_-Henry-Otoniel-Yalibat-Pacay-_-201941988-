<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial — Doctor Byte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-cpu me-2"></i>Doctor Byte
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="bi bi-search me-1"></i>Diagnóstico
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="historial.html">
              <i class="bi bi-clock-history me-1"></i>Historial
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Encabezado -->
  <section class="hero-section text-center py-5">
    <div class="container">
      <i class="bi bi-clock-history display-3 text-primary mb-3 d-block"></i>
      <h1 class="fw-bold">Historial de diagnósticos</h1>
      <p class="text-muted fs-5">Consulta todos los diagnósticos realizados por el sistema.</p>
    </div>
  </section>

  <!-- Tabla de historial -->
  <section class="container mb-5">
    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-table me-2 text-primary"></i>Registros</h5>
        <span id="total-registros" class="badge bg-primary">0 registros</span>
      </div>
      <div class="card-body p-0">
        <div id="historial-contenido">
          <div class="text-center text-muted py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Cargando historial...</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Modal detalle -->
  <div class="modal fade" id="modalDetalle" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-clipboard2-pulse me-2 text-primary"></i>Detalle del diagnóstico</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modal-detalle-contenido"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/historial.js"></script>
</body>
</html>
